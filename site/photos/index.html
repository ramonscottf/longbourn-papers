<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Longbourn Photo Studio</title>
<style>
  :root {
    --green: #1d322d;
    --green-light: #2a4a42;
    --gold: #C5955F;
    --cream: #FAF7F2;
    --ivory: #F5F0E8;
    --ink: #1A1A1A;
    --charcoal: #3D3D3D;
    --slate: #6B6B6B;
    --border: #E0DBD2;
    --error: #9B2C2C;
    --success: #2D6A4F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Libre Franklin', 'Helvetica Neue', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
  }

  .header {
    background: var(--green);
    color: white;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.25rem;
    font-weight: 400;
  }

  .header .badge {
    background: var(--gold);
    color: var(--green);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── Auth Gate ─── */
  .auth-gate {
    max-width: 400px;
    margin: 4rem auto;
    text-align: center;
  }

  .auth-gate h2 {
    font-family: 'Playfair Display', Georgia, serif;
    margin-bottom: 1rem;
  }

  .auth-gate input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    font-family: monospace;
  }

  .auth-gate button {
    width: 100%;
    padding: 12px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
  }

  /* ── Main Layout ─── */
  .studio { display: none; }
  .studio.active { display: block; }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }

  /* ── Category Headers ─── */
  .category-header {
    grid-column: 1 / -1;
    padding: 1rem 0 0.5rem;
    border-bottom: 2px solid var(--green);
    margin-top: 1rem;
  }

  .category-header h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.3rem;
    color: var(--green);
  }

  .category-header p {
    font-size: 0.8rem;
    color: var(--slate);
    margin-top: 0.25rem;
  }

  /* ── Slot Card ─── */
  .slot {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .slot:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .slot__header {
    padding: 0.75rem 1rem;
    background: var(--ivory);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slot__name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--green);
  }

  .slot__path {
    font-size: 0.7rem;
    color: var(--slate);
    font-family: monospace;
  }

  .slot__status {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .slot__status--empty { background: #FEF3C7; color: #92400E; }
  .slot__status--processing { background: #DBEAFE; color: #1E40AF; }
  .slot__status--done { background: #D1FAE5; color: #065F46; }
  .slot__status--error { background: #FEE2E2; color: #991B1B; }

  .slot__preview {
    aspect-ratio: 1;
    background: var(--ivory);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .slot__preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .slot__preview .placeholder {
    color: var(--border);
    font-size: 0.8rem;
    text-align: center;
    padding: 2rem;
  }

  .slot__compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    aspect-ratio: 2/1;
  }

  .slot__compare img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: var(--ivory);
  }

  .slot__compare-label {
    position: absolute;
    bottom: 4px;
    font-size: 0.6rem;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 1px 6px;
    border-radius: 2px;
  }

  .slot__actions {
    padding: 0.75rem 1rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .slot__drop-zone {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    min-width: 0;
  }

  .slot__drop-zone:hover,
  .slot__drop-zone.drag-over {
    border-color: var(--green);
    background: rgba(29, 50, 45, 0.04);
  }

  .slot__drop-zone input { display: none; }

  .slot__drop-zone span {
    font-size: 0.75rem;
    color: var(--slate);
  }

  .btn-sm {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    color: var(--charcoal);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .btn-sm:hover { border-color: var(--green); color: var(--green); }

  .btn-sm--primary {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  .btn-sm--primary:hover {
    background: var(--green-light);
  }

  .btn-sm:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── Progress ─── */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin: 0.5rem 1rem;
  }

  .progress-bar__fill {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.5s;
  }

  /* ── Stats Bar ─── */
  .stats {
    display: flex;
    gap: 2rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat__value {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.5rem;
    color: var(--green);
  }

  .stat__label {
    font-size: 0.7rem;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Description field ─── */
  .slot__description {
    padding: 0 1rem 0.5rem;
    font-size: 0.75rem;
    color: var(--slate);
    line-height: 1.4;
  }

  /* ── Log ─── */
  .log {
    margin-top: 2rem;
    background: var(--green);
    color: #a8d5a2;
    border-radius: 8px;
    padding: 1rem;
    font-family: monospace;
    font-size: 0.75rem;
    max-height: 200px;
    overflow-y: auto;
  }

  .log__entry { margin-bottom: 0.25rem; }
  .log__entry--error { color: #ff6b6b; }
  .log__entry--success { color: #69db7c; }

  @media (max-width: 768px) {
    .slot-grid { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
    .stats { gap: 1rem; }
  }

  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Libre+Franklin:wght@300;400;500;600&display=swap');
</style>

<div class="header">
  <h1>Longbourn Photo Studio</h1>
  <span class="badge">Internal Tool</span>
</div>

<!-- Auth Gate -->
<div class="auth-gate" id="authGate">

  <input type="password" id="authPassword" placeholder="Password" autofocus>
  <button onclick="authenticate()">Enter</button>
</div>

<!-- Main Studio -->
<div class="studio" id="studio">
  <div class="container">

    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat__value" id="statTotal">0</div>
        <div class="stat__label">Total Slots</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="statFilled">0</div>
        <div class="stat__label">Uploaded</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="statProcessed">0</div>
        <div class="stat__label">Enhanced</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="statDeployed">0</div>
        <div class="stat__label">In R2</div>
      </div>
    </div>

    <div class="slot-grid" id="slotGrid"></div>

    <div class="log" id="log">
      <div class="log__entry">Studio ready. Drop images into slots to begin.</div>
    </div>

  </div>
</div>

<script>

// ── Auth ──
function authenticate() {
  const pw = document.getElementById('authPassword').value;
  if (pw === PASSWORD) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('studio').classList.add('active');
    initStudio();
  } else {
    document.getElementById('authPassword').style.borderColor = '#9B2C2C';
    document.getElementById('authPassword').value = '';
    document.getElementById('authPassword').placeholder = 'Wrong password';
  }
}
document.getElementById('authPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') authenticate();
});

  { id: 'lifestyle-held', name: 'Lifestyle — Card in Hand', r2Path: 'products/lifestyle/card-in-hand.jpg', description: 'Someone holding a Longbourn card.' },
  { id: 'lifestyle-flatlay', name: 'Lifestyle — Flat Lay', r2Path: 'products/lifestyle/flatlay.jpg', description: 'Overhead styled composition with cards, pen, flowers.' },
  { id: 'lifestyle-packaging', name: 'Lifestyle — Gift Ready', r2Path: 'products/packaging/gift-ready.jpg', description: 'Cards packaged and ready to gift.' },
];

// ── State ──
const slotState = {};

function initStudio() {
  const grid = document.getElementById('slotGrid');
  let html = '';

  SLOTS.forEach((slot, i) => {
    if (slot.category) {
      html += `<div class="category-header"><h2>${slot.category}</h2><p>${slot.description || ''}</p></div>`;
      return;
    }

    slotState[slot.id] = { status: 'empty', originalUrl: null, enhancedUrl: null };

    html += `
      <div class="slot" id="slot-${slot.id}" data-slot-id="${slot.id}">
        <div class="slot__header">
          <div>
            <div class="slot__name">${slot.name}</div>
            <div class="slot__path">${slot.r2Path}</div>
          </div>
          <span class="slot__status slot__status--empty" id="status-${slot.id}">Needs Photo</span>
        </div>
        <div class="slot__preview" id="preview-${slot.id}">
          <div class="placeholder">${slot.description || 'Drop image here'}</div>
        </div>
        <div class="slot__actions">
          <label class="slot__drop-zone" id="drop-${slot.id}">
            <input type="file" accept="image/*" onchange="handleFile(event, '${slot.id}')">
            <span>Drop image or click to upload</span>
          </label>
        </div>
        <div class="progress-bar" id="progress-${slot.id}" style="display:none">
          <div class="progress-bar__fill" id="progressFill-${slot.id}"></div>
        </div>
      </div>
    `;
  });

  grid.innerHTML = html;
  updateStats();
  setupDragDrop();
}

function setupDragDrop() {
  document.querySelectorAll('.slot__drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const slotId = zone.id.replace('drop-', '');
      if (e.dataTransfer.files.length > 0) {
        processFile(e.dataTransfer.files[0], slotId);
      }
    });
  });
}

function handleFile(event, slotId) {
  const file = event.target.files[0];
  if (file) processFile(file, slotId);
}

async function processFile(file, slotId) {
  const slot = SLOTS.find(s => s.id === slotId);
  if (!slot) return;

  log(`Uploading ${file.name} to "${slot.name}"...`);
  setStatus(slotId, 'processing', 'Uploading...');
  showProgress(slotId, 10);

  // Show original preview
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById(`preview-${slotId}`);
    preview.innerHTML = `<img src="${e.target.result}" alt="Original">`;
    slotState[slotId].originalUrl = e.target.result;
  };
  reader.readAsDataURL(file);

  showProgress(slotId, 30);
  setStatus(slotId, 'processing', 'Enhancing...');
  log(`Sending to GPT-4o for enhancement...`);

  try {
    // Convert file to base64
    const base64 = await fileToBase64(file);
    showProgress(slotId, 40);

    // Send to our Worker API for processing
    const response = await fetch(API_BASE + '/enhance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: base64,
        slotId: slotId,
        r2Path: slot.r2Path,
        productType: slot.shopifyProduct || 'site',
        description: slot.description || slot.name,
      })
    });

    showProgress(slotId, 80);

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'Enhancement failed');
    }

    const result = await response.json();
    showProgress(slotId, 100);

    // Show the enhanced result
    if (result.enhancedUrl) {
      const preview = document.getElementById(`preview-${slotId}`);
      preview.innerHTML = `
        <div class="slot__compare" style="display:grid;grid-template-columns:1fr 1fr;">
          <div style="position:relative">
            <img src="${slotState[slotId].originalUrl}" alt="Original">
            <span class="slot__compare-label" style="left:4px">BEFORE</span>
          </div>
          <div style="position:relative">
            <img src="${result.enhancedUrl}" alt="Enhanced">
            <span class="slot__compare-label" style="right:4px">AFTER</span>
          </div>
        </div>
      `;
      slotState[slotId].enhancedUrl = result.enhancedUrl;
      slotState[slotId].status = 'done';

      // Add deploy button
      const actions = document.querySelector(`#slot-${slotId} .slot__actions`);
      if (!actions.querySelector('.btn-deploy')) {
        const deployBtn = document.createElement('button');
        deployBtn.className = 'btn-sm btn-sm--primary btn-deploy';
        deployBtn.textContent = result.deployed ? '✓ In R2' : 'Deploy to R2';
        deployBtn.disabled = result.deployed;
        if (!result.deployed) {
          deployBtn.onclick = () => deployToR2(slotId);
        }
        actions.appendChild(deployBtn);
      }

      setStatus(slotId, result.deployed ? 'done' : 'done', result.deployed ? 'In R2' : 'Enhanced');
      log(`✓ ${slot.name} enhanced successfully` + (result.deployed ? ' and deployed to R2' : ''), 'success');
    }

  } catch (err) {
    setStatus(slotId, 'error', 'Error');
    log(`✗ ${slot.name}: ${err.message}`, 'error');
    showProgress(slotId, 0);
  }

  updateStats();
}

async function deployToR2(slotId) {
  const slot = SLOTS.find(s => s.id === slotId);
  if (!slot || !slotState[slotId].enhancedUrl) return;

  setStatus(slotId, 'processing', 'Deploying...');
  log(`Deploying ${slot.name} to R2: ${slot.r2Path}`);

  try {
    const response = await fetch(API_BASE + '/deploy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slotId: slotId,
        r2Path: slot.r2Path,
        imageUrl: slotState[slotId].enhancedUrl,
      })
    });

    if (!response.ok) throw new Error('Deploy failed');

    setStatus(slotId, 'done', 'In R2');
    const btn = document.querySelector(`#slot-${slotId} .btn-deploy`);
    if (btn) { btn.textContent = '✓ In R2'; btn.disabled = true; }
    log(`✓ Deployed to R2: ${slot.r2Path}`, 'success');

  } catch (err) {
    setStatus(slotId, 'error', 'Deploy Failed');
    log(`✗ Deploy failed: ${err.message}`, 'error');
  }

  updateStats();
}

// ── Helpers ──
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setStatus(slotId, type, text) {
  const el = document.getElementById(`status-${slotId}`);
  if (!el) return;
  el.className = `slot__status slot__status--${type}`;
  el.textContent = text;
}

function showProgress(slotId, pct) {
  const bar = document.getElementById(`progress-${slotId}`);
  const fill = document.getElementById(`progressFill-${slotId}`);
  if (bar && fill) {
    bar.style.display = pct > 0 ? 'block' : 'none';
    fill.style.width = pct + '%';
  }
}

function log(msg, type) {
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log__entry' + (type ? ` log__entry--${type}` : '');
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

function updateStats() {
  const slots = SLOTS.filter(s => !s.category);
  const filled = Object.values(slotState).filter(s => s.originalUrl).length;
  const processed = Object.values(slotState).filter(s => s.enhancedUrl).length;
  const deployed = Object.values(slotState).filter(s => s.status === 'done').length;

  document.getElementById('statTotal').textContent = slots.length;
  document.getElementById('statFilled').textContent = filled;
  document.getElementById('statProcessed').textContent = processed;
  document.getElementById('statDeployed').textContent = deployed;
}
</script>
</body>
</html>
